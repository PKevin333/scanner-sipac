<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Scanner SIPAC</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --accent: #00d4aa;
    --accent2: #0088ff;
    --danger: #ff4757;
    --text: #e8eaf0;
    --muted: #7a7f9a;
    --border: #2e3250;
    --success: #00d4aa;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-box {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .header-text h1 {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--text);
  }

  .header-text p {
    font-size: 11px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
  }

  .container {
    width: 100%;
    max-width: 480px;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* Camera area */
  .camera-wrap {
    position: relative;
    width: 100%;
    border-radius: 16px;
    overflow: hidden;
    background: #000;
    aspect-ratio: 1 / 1;
    border: 1.5px solid var(--border);
  }

  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .camera-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  .scan-frame {
    width: 65%;
    aspect-ratio: 3/1.2;
    border-radius: 6px;
    position: relative;
  }

  .scan-frame::before, .scan-frame::after,
  .scan-frame .c3, .scan-frame .c4 {
    content: '';
    position: absolute;
    width: 22px; height: 22px;
    border-color: var(--accent);
    border-style: solid;
  }

  .scan-frame::before { top: 0; left: 0; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
  .scan-frame::after  { top: 0; right: 0; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
  .scan-frame .c3     { bottom: 0; left: 0; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
  .scan-frame .c4     { bottom: 0; right: 0; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }

  .scan-line {
    position: absolute;
    left: 8%; right: 8%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    border-radius: 2px;
    animation: scanline 2s ease-in-out infinite;
    box-shadow: 0 0 8px var(--accent);
  }

  @keyframes scanline {
    0%   { top: 10%; opacity: 0.4; }
    50%  { top: 85%; opacity: 1; }
    100% { top: 10%; opacity: 0.4; }
  }

  .camera-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: var(--surface);
  }

  .camera-placeholder .icon { font-size: 48px; opacity: 0.3; }
  .camera-placeholder p { font-size: 13px; color: var(--muted); text-align: center; max-width: 200px; line-height: 1.5; }

  /* Status badge */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: var(--surface);
    border-radius: 10px;
    border: 1px solid var(--border);
    font-size: 13px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background 0.3s;
  }

  .status-bar.active .status-dot { background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: pulse 1.5s infinite; }
  .status-bar.found .status-dot  { background: var(--success); box-shadow: 0 0 6px var(--success); animation: none; }
  .status-bar.error .status-dot  { background: var(--danger); animation: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; } 50% { opacity: 0.4; }
  }

  /* Result card */
  .result-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    display: none;
  }

  .result-card.visible { display: block; animation: slideUp 0.3s ease; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-label {
    padding: 10px 16px 6px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    font-family: 'IBM Plex Mono', monospace;
  }

  .result-code {
    padding: 4px 16px 14px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 22px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.06em;
    word-break: break-all;
    line-height: 1.3;
  }

  .result-type {
    padding: 0 16px 14px;
    font-size: 11px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
  }

  .copy-btn {
    margin: 0 16px 16px;
    width: calc(100% - 32px);
    padding: 13px;
    background: var(--accent);
    color: #0f1117;
    border: none;
    border-radius: 10px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.15s;
    letter-spacing: 0.02em;
  }

  .copy-btn:active { transform: scale(0.97); }
  .copy-btn.copied { background: var(--surface2); color: var(--accent); border: 1.5px solid var(--accent); }

  /* History */
  .history-wrap { display: none; }
  .history-wrap.visible { display: block; }

  .section-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    margin-bottom: 10px;
    padding: 0 2px;
  }

  .history-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .history-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    animation: slideUp 0.2s ease;
  }

  .hi-left { flex: 1; min-width: 0; }
  .hi-code {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .hi-meta {
    font-size: 11px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    margin-top: 2px;
  }

  .hi-copy {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 7px;
    padding: 6px 12px;
    font-size: 12px;
    font-family: 'IBM Plex Sans', sans-serif;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  .hi-copy:active { background: var(--accent); color: #0f1117; border-color: var(--accent); }

  /* Buttons */
  .btn-scan {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    color: #0f1117;
    border: none;
    border-radius: 12px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: all 0.15s;
    letter-spacing: 0.02em;
    box-shadow: 0 4px 20px rgba(0,212,170,0.2);
  }

  .btn-scan:active { transform: scale(0.98); }
  .btn-scan.stop {
    background: var(--surface2);
    color: var(--danger);
    box-shadow: none;
    border: 1.5px solid var(--danger);
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--accent);
    color: #0f1117;
    padding: 12px 24px;
    border-radius: 50px;
    font-weight: 700;
    font-size: 14px;
    transition: transform 0.3s ease;
    z-index: 100;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  #canvas { display: none; }
</style>
</head>
<body>

<header>
  <div class="logo-box">📦</div>
  <div class="header-text">
    <h1>SCANNER SIPAC</h1>
    <p>leitura de código de barras</p>
  </div>
</header>

<div class="container">

  <div class="camera-wrap" id="cameraWrap">
    <div class="camera-placeholder" id="placeholder">
      <div class="icon">📷</div>
      <p>Pressione o botão abaixo para ativar a câmera</p>
    </div>
    <video id="video" autoplay playsinline muted></video>
    <div class="camera-overlay" id="overlay" style="display:none">
      <div class="scan-frame">
        <div class="c3"></div><div class="c4"></div>
        <div class="scan-line"></div>
      </div>
    </div>
  </div>

  <div class="status-bar" id="statusBar">
    <div class="status-dot"></div>
    <span id="statusText">Câmera desligada</span>
  </div>

  <button class="btn-scan" id="btnScan" onclick="toggleScan()">
    <span>▶</span> Iniciar Leitura
  </button>

  <div class="result-card" id="resultCard">
    <div class="result-label">Código lido</div>
    <div class="result-code" id="resultCode">—</div>
    <div class="result-type" id="resultType"></div>
    <button class="copy-btn" id="copyBtn" onclick="copyCode()">
      📋 Copiar para o SIPAC
    </button>
  </div>

  <div class="history-wrap" id="historyWrap">
    <div class="section-title">Histórico da sessão</div>
    <div class="history-list" id="historyList"></div>
  </div>

</div>

<div class="toast" id="toast">✓ Copiado!</div>
<canvas id="canvas"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/zxing-js/0.19.1/zxing.min.js"></script>
<script>
let scanning = false;
let stream = null;
let animFrame = null;
let codeReader = null;
let lastCode = '';
let history = [];

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

async function toggleScan() {
  if (scanning) {
    stopScan();
  } else {
    await startScan();
  }
}

async function startScan() {
  const btn = document.getElementById('btnScan');
  btn.innerHTML = '⏹ Parar câmera';
  btn.classList.add('stop');

  setStatus('active', 'Aguardando câmera...');

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
    });

    video.srcObject = stream;
    document.getElementById('placeholder').style.display = 'none';
    document.getElementById('overlay').style.display = 'flex';

    await video.play();
    scanning = true;
    setStatus('active', 'Aponte para o código de barras');
    lastCode = '';
    loop();
  } catch (e) {
    setStatus('error', 'Permissão de câmera negada');
    btn.innerHTML = '▶ Iniciar Leitura';
    btn.classList.remove('stop');
  }
}

function stopScan() {
  scanning = false;
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
  video.srcObject = null;

  document.getElementById('placeholder').style.display = 'flex';
  document.getElementById('overlay').style.display = 'none';

  const btn = document.getElementById('btnScan');
  btn.innerHTML = '▶ Iniciar Leitura';
  btn.classList.remove('stop');
  setStatus('', 'Câmera desligada');
}

function loop() {
  if (!scanning) return;
  animFrame = requestAnimationFrame(() => {
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      tryDecode();
    }
    loop();
  });
}

function tryDecode() {
  try {
    const img = ctx.getImageData(0, 0, canvas.width, canvas.height);

    if (!codeReader) {
      if (typeof ZXing !== 'undefined') {
        const hints = new Map();
        hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
        codeReader = new ZXing.BrowserMultiFormatReader(hints);
      } else {
        fallbackDecode();
        return;
      }
    }

    const result = codeReader.decodeFromImageData(img);
    if (result && result.text && result.text !== lastCode) {
      lastCode = result.text;
      onCodeFound(result.text, result.getBarcodeFormat ? result.getBarcodeFormat().toString() : 'Código de barras');
    }
  } catch (e) { /* nenhum código encontrado ainda */ }
}

function fallbackDecode() {
  // Fallback: usa API nativa de detecção se disponível (Chrome Android)
  if ('BarcodeDetector' in window) {
    const detector = new BarcodeDetector({ formats: ['code_128','code_39','ean_13','ean_8','upc_a','upc_e','qr_code','data_matrix','aztec','pdf417','itf','codabar'] });
    const imgBitmap = createImageBitmap(canvas).then(bmp => {
      detector.detect(bmp).then(codes => {
        if (codes.length > 0 && codes[0].rawValue !== lastCode) {
          lastCode = codes[0].rawValue;
          onCodeFound(codes[0].rawValue, codes[0].format || 'Código de barras');
        }
      });
    });
  }
}

function onCodeFound(code, format) {
  // Vibrar
  if (navigator.vibrate) navigator.vibrate([80, 40, 80]);

  setStatus('found', 'Código lido com sucesso!');

  document.getElementById('resultCode').textContent = code;
  document.getElementById('resultType').textContent = 'Formato: ' + formatName(format);
  document.getElementById('resultCard').classList.add('visible');

  const btn = document.getElementById('copyBtn');
  btn.textContent = '📋 Copiar para o SIPAC';
  btn.classList.remove('copied');

  addHistory(code, format);

  // Pausa leitura por 3s para evitar duplicatas
  scanning = false;
  setTimeout(() => {
    if (stream) {
      scanning = true;
      lastCode = '';
      loop();
      setStatus('active', 'Aponte para o próximo código');
    }
  }, 3000);
}

function copyCode() {
  const code = document.getElementById('resultCode').textContent;
  if (!code || code === '—') return;

  navigator.clipboard.writeText(code).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✓ Copiado!';
    btn.classList.add('copied');
    showToast('✓ Copiado! Cole no SIPAC (Ctrl+V)');
  }).catch(() => {
    // Fallback
    const el = document.createElement('textarea');
    el.value = code;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    showToast('✓ Copiado!');
  });
}

function addHistory(code, format) {
  const now = new Date();
  const time = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  history.unshift({ code, format, time });
  if (history.length > 20) history.pop();
  renderHistory();
}

function renderHistory() {
  const wrap = document.getElementById('historyWrap');
  const list = document.getElementById('historyList');

  if (history.length === 0) { wrap.classList.remove('visible'); return; }
  wrap.classList.add('visible');

  list.innerHTML = history.map((h, i) => `
    <div class="history-item">
      <div class="hi-left">
        <div class="hi-code">${h.code}</div>
        <div class="hi-meta">${formatName(h.format)} · ${h.time}</div>
      </div>
      <button class="hi-copy" onclick="copyHistoryItem(${i})">Copiar</button>
    </div>
  `).join('');
}

function copyHistoryItem(i) {
  const code = history[i].code;
  navigator.clipboard.writeText(code).catch(() => {
    const el = document.createElement('textarea');
    el.value = code;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
  });
  showToast('✓ Copiado!');
}

function setStatus(type, msg) {
  const bar = document.getElementById('statusBar');
  bar.className = 'status-bar' + (type ? ' ' + type : '');
  document.getElementById('statusText').textContent = msg;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function formatName(f) {
  if (!f) return 'Código de barras';
  const map = { 'CODE_128': 'Code 128', 'CODE_39': 'Code 39', 'EAN_13': 'EAN-13', 'EAN_8': 'EAN-8', 'UPC_A': 'UPC-A', 'UPC_E': 'UPC-E', 'QR_CODE': 'QR Code', 'PDF_417': 'PDF 417', 'DATA_MATRIX': 'Data Matrix', 'ITF': 'ITF', 'CODABAR': 'Codabar' };
  return map[f.toUpperCase()] || f;
}

// Detecta se BarcodeDetector nativo está disponível e não há ZXing
window.addEventListener('load', () => {
  if (typeof ZXing === 'undefined') {
    console.log('ZXing não carregou, usando BarcodeDetector nativo');
    codeReader = null;
  }
});
</script>
</body>
</html>
