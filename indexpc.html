<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIPAC - Recebedor</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0f1117;
  color: white;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 30px;
}
.card {
  background: #1a1d27;
  border-radius: 16px;
  padding: 40px;
  width: 100%;
  max-width: 500px;
  text-align: center;
  border: 1px solid #2e3250;
}
h2 { font-size: 20px; margin-bottom: 8px; color: #e8eaf0; }
.subtitle { font-size: 13px; color: #7a7f9a; margin-bottom: 32px; }
.waiting {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  padding: 20px 0;
}
.pulse {
  width: 60px; height: 60px;
  border-radius: 50%;
  background: #00d4aa22;
  border: 3px solid #00d4aa;
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.15); opacity: 0.6; }
}
.waiting-text { font-size: 14px; color: #7a7f9a; }
.result-area { display: none; flex-direction: column; gap: 16px; }
.codigo-box {
  background: #0f1117;
  border: 2px solid #00d4aa;
  border-radius: 12px;
  padding: 20px;
  font-size: 36px;
  font-weight: bold;
  color: #00d4aa;
  letter-spacing: 0.05em;
  word-break: break-all;
  animation: pop 0.3s ease;
}
@keyframes pop {
  0% { transform: scale(0.92); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
.btn-copy {
  padding: 14px;
  width: 100%;
  border: none;
  border-radius: 10px;
  background: #00d4aa;
  color: #000;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  transition: opacity 0.2s;
}
.btn-copy:hover { opacity: 0.9; }
.btn-copy.copied { background: #1a1d27; color: #00d4aa; border: 2px solid #00d4aa; }
.btn-novo {
  padding: 10px;
  width: 100%;
  border: 1px solid #2e3250;
  border-radius: 10px;
  background: transparent;
  color: #7a7f9a;
  font-size: 14px;
  cursor: pointer;
}
.btn-novo:hover { border-color: #7a7f9a; color: #e8eaf0; }
.historico-wrap { margin-top: 32px; width: 100%; max-width: 500px; }
.hist-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.hist-title { font-size: 12px; color: #7a7f9a; text-transform: uppercase; letter-spacing: 0.08em; }
.btn-limpar {
  background: transparent;
  border: 1px solid #ff4757;
  color: #ff4757;
  border-radius: 6px;
  padding: 4px 10px;
  font-size: 11px;
  cursor: pointer;
}
.hist-list { display: flex; flex-direction: column; gap: 6px; }
.hist-item {
  background: #1a1d27;
  border: 1px solid #2e3250;
  border-radius: 8px;
  padding: 10px 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 14px;
}
.hist-code { font-weight: bold; color: #e8eaf0; font-family: monospace; font-size: 15px; }
.hist-time { font-size: 11px; color: #7a7f9a; }
.hist-copy {
  background: #22263a;
  border: 1px solid #2e3250;
  color: #e8eaf0;
  border-radius: 6px;
  padding: 5px 10px;
  font-size: 12px;
  cursor: pointer;
}
#conn-status {
  margin-top: 20px;
  font-size: 12px;
  color: #7a7f9a;
  display: flex;
  align-items: center;
  gap: 6px;
}
.dot { width: 8px; height: 8px; border-radius: 50%; background: #7a7f9a; }
.dot.ok { background: #00d4aa; }
.dot.err { background: #ff4757; }
</style>
</head>
<body>

<div class="card">
  <h2>📺 Recebedor SIPAC</h2>
  <p class="subtitle">Aguardando leitura do celular...</p>
  <div class="waiting" id="waiting">
    <div class="pulse"></div>
    <p class="waiting-text">Abra o Scanner no celular e aponte para o QR Code</p>
  </div>
  <div class="result-area" id="result-area">
    <div class="codigo-box" id="codigo">—</div>
    <button class="btn-copy" id="btn-copy" onclick="copiar()">📋 Copiar para o SIPAC (Ctrl+V)</button>
    <button class="btn-novo" onclick="resetar()">🔄 Aguardar próximo código</button>
  </div>
</div>

<div class="historico-wrap" id="historico-wrap" style="display:none">
  <div class="hist-header">
    <span class="hist-title">Histórico salvo</span>
    <button class="btn-limpar" onclick="limparHistorico()">🗑 Limpar tudo</button>
  </div>
  <div class="hist-list" id="hist-list"></div>
</div>

<div id="conn-status">
  <div class="dot" id="dot"></div>
  <span id="conn-text">Conectando...</span>
</div>

<script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
<script>
const STORAGE_KEY = 'sipac_historico';

function carregarHistorico() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  } catch(e) { return []; }
}

function salvarHistorico(hist) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(hist));
}

let historico = carregarHistorico();

if (historico.length > 0) renderHistorico();

const pusher = new Pusher('290a0ae2aca24d0b44bf', { cluster: 'sa1' });
const channel = pusher.subscribe('sipac');

pusher.connection.bind('connected', () => {
  document.getElementById('dot').className = 'dot ok';
  document.getElementById('conn-text').textContent = 'Conectado — aguardando celular';
});

pusher.connection.bind('disconnected', () => {
  document.getElementById('dot').className = 'dot err';
  document.getElementById('conn-text').textContent = 'Desconectado — recarregue a página';
});

channel.bind('codigo-lido', (data) => {
  const codigo = data.codigo;
  mostrarCodigo(codigo);
  adicionarHistorico(codigo);
  navigator.clipboard.writeText(codigo).catch(() => {});
});

function mostrarCodigo(codigo) {
  document.getElementById('waiting').style.display = 'none';
  const area = document.getElementById('result-area');
  area.style.display = 'flex';
  document.getElementById('codigo').textContent = codigo;
  document.getElementById('btn-copy').textContent = '📋 Copiar para o SIPAC (Ctrl+V)';
  document.getElementById('btn-copy').classList.remove('copied');
}

function copiar() {
  const codigo = document.getElementById('codigo').textContent;
  navigator.clipboard.writeText(codigo).then(() => {
    const btn = document.getElementById('btn-copy');
    btn.textContent = '✓ Copiado! Cole no campo Tombamento';
    btn.classList.add('copied');
  });
}

function resetar() {
  document.getElementById('result-area').style.display = 'none';
  document.getElementById('waiting').style.display = 'flex';
}

function adicionarHistorico(codigo) {
  const agora = new Date();
  const data = agora.toLocaleDateString('pt-BR');
  const hora = agora.toLocaleTimeString('pt-BR');
  historico.unshift({ codigo, data, hora });
  if (historico.length > 50) historico.pop();
  salvarHistorico(historico);
  renderHistorico();
}

function renderHistorico() {
  const wrap = document.getElementById('historico-wrap');
  const list = document.getElementById('hist-list');
  wrap.style.display = 'block';
  list.innerHTML = historico.map((h, i) => `
    <div class="hist-item">
      <div>
        <div class="hist-code">${h.codigo}</div>
        <div class="hist-time">${h.data} · ${h.hora}</div>
      </div>
      <button class="hist-copy" onclick="copiarHist(${i})">Copiar</button>
    </div>
  `).join('');
}

function copiarHist(i) {
  navigator.clipboard.writeText(historico[i].codigo).catch(() => {});
  event.target.textContent = '✓';
  setTimeout(() => event.target.textContent = 'Copiar', 1500);
}

function limparHistorico() {
  if (confirm('Apagar todo o histórico?')) {
    historico = [];
    salvarHistorico(historico);
    document.getElementById('historico-wrap').style.display = 'none';
  }
}
</script>
</body>
</html>
