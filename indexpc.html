<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIPAC - Recebedor de Patrimônio</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #f4f4f0;
  color: #1a1a1a;
  font-family: Arial, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
header {
  background: #1a3a6b;
  border-bottom: 4px solid #f5c400;
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.logo-prf {
  width: 48px;
  height: 48px;
  background: #f5c400;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: bold;
  color: #1a3a6b;
  flex-shrink: 0;
  letter-spacing: 0.02em;
}
.header-text .title { font-size: 15px; font-weight: bold; color: #fff; letter-spacing: 0.04em; }
.header-text .sub { font-size: 11px; color: #f5c400; margin-top: 2px; }
.subheader {
  background: #f5c400;
  padding: 7px 24px;
  border-bottom: 1px solid #d4a800;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.subheader span { font-size: 11px; font-weight: bold; color: #2c2c00; text-transform: uppercase; letter-spacing: 0.05em; }
.subheader .data { font-size: 10px; color: #5c4a00; font-weight: normal; text-transform: none; letter-spacing: 0; }
.breadcrumb {
  background: #fff;
  padding: 5px 24px;
  border-bottom: 1px solid #e0e0e0;
  font-size: 10px;
  color: #999;
}
.main { flex: 1; padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; max-width: 800px; width: 100%; margin: 0 auto; }
.waiting-card {
  background: #fff;
  border: 1px solid #ddd;
  border-radius: 4px;
  padding: 32px;
  text-align: center;
  border-left: 4px solid #f5c400;
}
.pulse-wrap { display: flex; justify-content: center; margin-bottom: 14px; }
.pulse {
  width: 50px; height: 50px;
  border-radius: 50%;
  background: #fff8e0;
  border: 3px solid #f5c400;
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.12); opacity: 0.6; }
}
.waiting-title { font-size: 13px; font-weight: bold; color: #333; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
.waiting-sub { font-size: 12px; color: #888; }
.result-card {
  background: #fff;
  border: 1px solid #ddd;
  border-radius: 4px;
  padding: 20px;
  border-left: 4px solid #f5c400;
  display: none;
  flex-direction: column;
  gap: 12px;
}
.result-label { font-size: 9px; color: #888; text-transform: uppercase; letter-spacing: 0.06em; }
.codigo-box {
  font-size: 32px;
  font-weight: bold;
  color: #1a1a1a;
  font-family: monospace;
  letter-spacing: 0.04em;
  animation: pop 0.3s ease;
}
@keyframes pop {
  0% { transform: scale(0.95); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
.btn-row { display: flex; gap: 10px; }
