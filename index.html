<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SIPAC - Scanner de Patrimônio</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #f4f4f0;
  color: #1a1a1a;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}
header {
  background: #1a3a6b;
  border-bottom: 4px solid #f5c400;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
header img { width: 44px; height: 44px; object-fit: contain; }
.header-text { display: flex; flex-direction: column; }
.header-text .title { font-size: 13px; font-weight: bold; color: #fff; letter-spacing: 0.04em; }
.header-text .sub { font-size: 10px; color: #f5c400; margin-top: 1px; }
.subheader {
  background: #f5c400;
  padding: 6px 16px;
  border-bottom: 1px solid #d4a800;
  font-size: 10px;
  font-weight: bold;
  color: #2c2c00;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.content {
  flex: 1;
  padding: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}
video {
  width: 100%;
  max-width: 400px;
  border-radius: 4px;
  background: #000;
  border: 1px solid #ccc;
}
.btn-scan {
  padding: 13px;
  width: 100%;
  max-width: 400px;
  border: none;
  border-radius: 3px;
  background: #f5c400;
  font-weight: bold;
  font-size: 13px;
  cursor: pointer;
  color: #2c2c00;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.btn-scan:active { opacity: 0.85; }
.btn-scan.parar {
  background: #fff;
  border: 1px solid #1a3a6b;
  color: #1a3a6b;
}
#result-box {
  width: 100%;
  max-width: 400px;
  display: none;
  flex-direction: column;
  gap: 8px;
}
.result-label {
  font-size: 9px;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
#result {
  font-size: 22px;
  font-weight: bold;
  color: #1a1a1a;
  font-family: monospace;
  background: #fff;
  padding: 12px;
  border-radius: 3px;
  border: 1px solid #ddd;
  border-left: 4px solid #f5c400;
  letter-spacing: 0.04em;
}
.btn-copy {
  padding: 11px;
  width: 100%;
  border: none;
  border-radius: 3px;
  background: #f5c400;
  color: #2c2c00;
  font-size: 12px;
  font-weight: bold;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.btn-copy.copiado {
  background: #fff;
  border: 1px solid #2c7a00;
  color: #2c7a00;
}
.btn-novo {
  padding: 9px;
  width: 100%;
  border: 1px solid #bbb;
  border-radius: 3px;
  background: #fff;
  color: #555;
  font-size: 12px;
  cursor: pointer;
}
#status {
  font-size: 12px;
  color: #666;
  text-align: center;
  max-width: 400px;
  width: 100%;
}
#send-status {
  font-size: 12px;
  text-align: center;
  color: #2c7a00;
  font-weight: bold;
  display: none;
  width: 100%;
  max-width: 400px;
}
footer {
  background: #1a3a6b;
  padding: 5px 16px;
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: auto;
}
.dot-footer { width: 7px; height: 7px; border-radius: 50%; background: #888; }
.dot-footer.ok { background: #4caf50; }
footer span { font-size: 9px; color: #ccd9f0; }
canvas { display: none; }
</style>
</head>
<body>

<header>
  <img src="https://upload.wikimedia.org/wikipedia/commons/3/3b/Prf_brasao_novo.jpg" alt="PRF" />
  <div class="header-text">
    <span class="title">POLÍCIA RODOVIÁRIA FEDERAL</span>
    <span class="sub">SIPAC — Gestão de Patrimônio</span>
  </div>
</header>

<div class="subheader">Leitura de QR Code — Patrimônio</div>

<div class="content">
  <video id="video" autoplay playsinline muted></video>
  <button class="btn-scan" onclick="toggleScan()" id="btn">Iniciar Leitura</button>

  <div id="result-box">
    <div class="result-label">Número lido</div>
    <div id="result">—</div>
    <button class="btn-copy" onclick="copiar()" id="btn-copy">Copiar Número</button>
    <button class="btn-novo" onclick="novaScan()">Ler Próximo</button>
  </div>

  <div id="status">Câmera desligada</div>
  <div id="send-status">Enviado para o PC com sucesso</div>
</div>

<footer>
  <div class="dot-footer" id="dot-footer"></div>
  <span id="footer-text">Aguardando...</span>
</footer>

<canvas id="canvas"></canvas>

<script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
<script>
const PIPEDREAM_URL = 'https://eoxxorudr469v7q.m.pipedream.net';
const PUSHER_KEY = '290a0ae2aca24d0b44bf';
const PUSHER_CLUSTER = 'sa1';

new Pusher(PUSHER_KEY, { cluster: PUSHER_CLUSTER });

let scanning = false;
let stream = null;
let animFrame = null;
let lastCode = '';
let detector = null;

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const btn = document.getElementById('btn');
const statusEl = document.getElementById('status');
const sendStatus = document.getElementById('send-status');
const resultBox = document.getElementById('result-box');
const resultDiv = document.getElementById('result');
const dotFooter = document.getElementById('dot-footer');
const footerText = document.getElementById('footer-text');

async function toggleScan() {
  scanning ? stopScan() : await startScan();
}

async function startScan() {
  if (!('BarcodeDetector' in window)) {
    statusEl.textContent = 'Use o Chrome atualizado para escanear.';
    return;
  }
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    video.srcObject = stream;
    await video.play();
    detector = new BarcodeDetector({
      formats: ['qr_code', 'code_128', 'code_39', 'ean_13', 'ean_8', 'itf', 'pdf417', 'data_matrix']
    });
    scanning = true;
    lastCode = '';
    btn.textContent = 'Parar Leitura';
    btn.classList.add('parar');
    statusEl.textContent = 'Aponte para o QR Code do bem';
    sendStatus.style.display = 'none';
    resultBox.style.display = 'none';
    dotFooter.className = 'dot-footer ok';
    footerText.textContent = 'Camera ativa — aguardando leitura';
    loop();
  } catch (err) {
    statusEl.textContent = 'Erro: permissao de camera negada';
  }
}

function stopScan() {
  scanning = false;
  if (animFrame) cancelAnimationFrame(animFrame);
  if (stream) stream.getTracks().forEach(t => t.stop());
  video.srcObject = null;
  btn.textContent = 'Iniciar Leitura';
  btn.classList.remove('parar');
  statusEl.textContent = 'Camera desligada';
  dotFooter.className = 'dot-footer';
  footerText.textContent = 'Camera desligada';
}

function loop() {
  if (!scanning) return;
  animFrame = requestAnimationFrame(async () => {
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      try {
        const codes = await detector.detect(canvas);
        if (codes.length > 0) {
          const code = codes[0].rawValue;
          if (code && code !== lastCode) {
            lastCode = code;
            onCodeFound(code);
            return;
          }
        }
      } catch (e) {}
    }
    loop();
  });
}

async function onCodeFound(code) {
  if (navigator.vibrate) navigator.vibrate([80, 40, 80]);
  resultDiv.textContent = code;
  resultBox.style.display = 'flex';
  document.getElementById('btn-copy').textContent = 'Copiar Número';
  document.getElementById('btn-copy').classList.remove('copiado');
  statusEl.textContent = 'Numero lido com sucesso';
  sendStatus.style.display = 'none';
  stopScan();
  try {
    await fetch(PIPEDREAM_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ codigo: code })
    });
    sendStatus.style.display = 'block';
    dotFooter.className = 'dot-footer ok';
    footerText.textContent = 'Enviado para o PC com sucesso';
  } catch(e) {}
}

function copiar() {
  const code = resultDiv.textContent;
  navigator.clipboard.writeText(code).then(() => {
    const b = document.getElementById('btn-copy');
    b.textContent = 'Copiado!';
    b.classList.add('copiado');
  }).catch(() => {
    const el = document.createElement('textarea');
    el.value = code;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    document.getElementById('btn-copy').textContent = 'Copiado!';
  });
}

function novaScan() {
  resultBox.style.display = 'none';
  sendStatus.style.display = 'none';
  startScan();
}
</script>
</body>
</html>
