<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Scanner SIPAC</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0f1117;
  color: white;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
  min-height: 100vh;
}
h2 { margin-bottom: 16px; font-size: 20px; }
video {
  width: 100%;
  max-width: 400px;
  border-radius: 12px;
  margin-bottom: 15px;
  background: #000;
}
.btn-scan {
  padding: 15px;
  width: 100%;
  max-width: 400px;
  border: none;
  border-radius: 10px;
  background: #00d4aa;
  font-weight: bold;
  font-size: 16px;
  cursor: pointer;
  color: #000;
  margin-bottom: 16px;
}
#result-box {
  width: 100%;
  max-width: 400px;
  display: none;
  flex-direction: column;
  gap: 10px;
}
#result {
  font-size: 26px;
  color: #00d4aa;
  font-weight: bold;
  word-break: break-all;
  text-align: center;
  padding: 16px;
  background: #1a1d27;
  border-radius: 10px;
}
.btn-copy {
  padding: 13px;
  width: 100%;
  border: 2px solid #00d4aa;
  border-radius: 10px;
  background: #1a1d27;
  color: #00d4aa;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
}
#status {
  margin-top: 14px;
  font-size: 13px;
  color: #7a7f9a;
  text-align: center;
  max-width: 400px;
}
#send-status {
  margin-top: 8px;
  font-size: 13px;
  text-align: center;
  color: #00d4aa;
  display: none;
}
canvas { display: none; }
</style>
</head>
<body>

<h2>📦 Scanner SIPAC</h2>
<video id="video" autoplay playsinline muted></video>
<button class="btn-scan" onclick="toggleScan()" id="btn">▶ Iniciar</button>

<div id="result-box">
  <div id="result">—</div>
  <button class="btn-copy" onclick="copiar()">📋 Copiar</button>
</div>

<div id="status">Câmera desligada</div>
<div id="send-status">✓ Enviado para o PC!</div>

<canvas id="canvas"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/zxing-js/0.19.1/zxing.min.js"></script>
<script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
<script>
const PUSHER_KEY = '290a0ae2aca24d0b44bf';
const PUSHER_CLUSTER = 'sa1';

const pusher = new Pusher(PUSHER_KEY, { cluster: PUSHER_CLUSTER });

let scanning = false;
let stream = null;
let animFrame = null;
let lastCode = '';
let reader = null;

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const btn = document.getElementById('btn');
const status = document.getElementById('status');
const sendStatus = document.getElementById('send-status');
const resultBox = document.getElementById('result-box');
const resultDiv = document.getElementById('result');

function getReader() {
  if (!reader) {
    const hints = new Map();
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
      ZXing.BarcodeFormat.QR_CODE,
      ZXing.BarcodeFormat.CODE_128,
      ZXing.BarcodeFormat.CODE_39,
      ZXing.BarcodeFormat.EAN_13,
      ZXing.BarcodeFormat.EAN_8,
      ZXing.BarcodeFormat.ITF
    ]);
    hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
    reader = new ZXing.BrowserMultiFormatReader(hints);
  }
  return reader;
}

async function toggleScan() {
  scanning ? stopScan() : await startScan();
}

async function startScan() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    video.srcObject = stream;
    await video.play();
    scanning = true;
    lastCode = '';
    btn.textContent = '⏹ Parar';
    status.textContent = 'Aponte para o QR Code ou código de barras';
    sendStatus.style.display = 'none';
    loop();
  } catch (err) {
    status.textContent = 'Erro: permissão de câmera negada';
  }
}

function stopScan() {
  scanning = false;
  if (animFrame) cancelAnimationFrame(animFrame);
  if (stream) stream.getTracks().forEach(t => t.stop());
  video.srcObject = null;
  btn.textContent = '▶ Iniciar';
  status.textContent = 'Câmera desligada';
}

function loop() {
  if (!scanning) return;
  animFrame = requestAnimationFrame(() => {
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      try {
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const luminance = new ZXing.RGBLuminanceSource(imgData.data, canvas.width, canvas.height);
        const bitmap = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(luminance));
        const result = getReader().decode(bitmap);
        if (result && result.text && result.text !== lastCode) {
          lastCode = result.text;
          onCodeFound(result.text);
        }
      } catch (e) {}
    }
    loop();
  });
}

async function onCodeFound(code) {
  if (navigator.vibrate) navigator.vibrate(100);
  resultDiv.textContent = code;
  resultBox.style.display = 'flex';
  status.textContent = '✓ Código lido!';
  stopScan();

  // Envia para o PC via Pusher REST API
  try {
    await fetch('https://api-sa1.pusher.com/apps/2129496/events', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: 'codigo-lido',
        channel: 'sipac',
        data: JSON.stringify({ codigo: code }),
        auth_key: PUSHER_KEY
      })
    });
    sendStatus.style.display = 'block';
  } catch(e) {
    // fallback: só mostra o código localmente
  }
}

function copiar() {
  const code = resultDiv.textContent;
  navigator.clipboard.writeText(code).then(() => {
    document.querySelector('.btn-copy').textContent = '✓ Copiado!';
  }).catch(() => {
    const el = document.createElement('textarea');
    el.value = code;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    document.querySelector('.btn-copy').textContent = '✓ Copiado!';
  });
}
</script>
</body>
</html>
