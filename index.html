<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Scanner SIPAC</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0f1117;
  color: white;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
  min-height: 100vh;
}
h2 { margin-bottom: 16px; font-size: 20px; }
video {
  width: 100%;
  max-width: 400px;
  border-radius: 12px;
  margin-bottom: 15px;
  background: #000;
}
.btn-scan {
  padding: 15px;
  width: 100%;
  max-width: 400px;
  border: none;
  border-radius: 10px;
  background: #00d4aa;
  font-weight: bold;
  font-size: 16px;
  cursor: pointer;
  color: #000;
  margin-bottom: 16px;
}
#result-box {
  width: 100%;
  max-width: 400px;
  display: none;
  flex-direction: column;
  gap: 10px;
}
#result {
  font-size: 26px;
  color: #00d4aa;
  font-weight: bold;
  word-break: break-all;
  text-align: center;
  padding: 16px;
  background: #1a1d27;
  border-radius: 10px;
}
.btn-copy {
  padding: 13px;
  width: 100%;
  border: 2px solid #00d4aa;
  border-radius: 10px;
  background: #1a1d27;
  color: #00d4aa;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
}
.btn-novo {
  padding: 11px;
  width: 100%;
  border: 1px solid #2e3250;
  border-radius: 10px;
  background: transparent;
  color: #7a7f9a;
  font-size: 14px;
  cursor: pointer;
}
#status {
  margin-top: 14px;
  font-size: 13px;
  color: #7a7f9a;
  text-align: center;
  max-width: 400px;
}
#send-status {
  margin-top: 8px;
  font-size: 13px;
  text-align: center;
  color: #00d4aa;
  display: none;
}
canvas { display: none; }
</style>
</head>
<body>

<h2>📦 Scanner SIPAC</h2>
<video id="video" autoplay playsinline muted></video>
<button class="btn-scan" onclick="toggleScan()" id="btn">▶ Iniciar</button>

<div id="result-box">
  <div id="result">—</div>
  <button class="btn-copy" onclick="copiar()">📋 Copiar</button>
  <button class="btn-novo" onclick="novaScan()">🔄 Ler próximo</button>
</div>

<div id="status">Câmera desligada</div>
<div id="send-status">✓ Enviado para o PC!</div>

<canvas id="canvas"></canvas>

<script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
<script>
const PUSHER_KEY = '290a0ae2aca24d0b44bf';
const PUSHER_SECRET = 'e3cd6299bc4802a0d8cc';
const PUSHER_APP_ID = '2129496';
const PUSHER_CLUSTER = 'sa1';

let scanning = false;
let stream = null;
let animFrame = null;
let lastCode = '';
let detector = null;

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const btn = document.getElementById('btn');
const statusEl = document.getElementById('status');
const sendStatus = document.getElementById('send-status');
const resultBox = document.getElementById('result-box');
const resultDiv = document.getElementById('result');

async function toggleScan() {
  scanning ? stopScan() : await startScan();
}

async function startScan() {
  if (!('BarcodeDetector' in window)) {
    statusEl.textContent = '⚠️ Use o Chrome atualizado para escanear.';
    return;
  }
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    video.srcObject = stream;
    await video.play();
    detector = new BarcodeDetector({
      formats: ['qr_code', 'code_128', 'code_39', 'ean_13', 'ean_8', 'itf', 'pdf417', 'data_matrix']
    });
    scanning = true;
    lastCode = '';
    btn.textContent = '⏹ Parar';
    statusEl.textContent = '📷 Aponte para o QR Code';
    sendStatus.style.display = 'none';
    resultBox.style.display = 'none';
    loop();
  } catch (err) {
    statusEl.textContent = 'Erro: permissão de câmera negada';
  }
}

function stopScan() {
  scanning = false;
  if (animFrame) cancelAnimationFrame(animFrame);
  if (stream) stream.getTracks().forEach(t => t.stop());
  video.srcObject = null;
  btn.textContent = '▶ Iniciar';
  statusEl.textContent = 'Câmera desligada';
}

function loop() {
  if (!scanning) return;
  animFrame = requestAnimationFrame(async () => {
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      try {
        const codes = await detector.detect(canvas);
        if (codes.length > 0) {
          const code = codes[0].rawValue;
          if (code && code !== lastCode) {
            lastCode = code;
            onCodeFound(code);
            return;
          }
        }
      } catch (e) {}
    }
    loop();
  });
}

async function hmacSHA256(secret, message) {
  const enc = new TextEncoder();
  const key = await crypto.subtle.importKey(
    'raw', enc.encode(secret),
    { name: 'HMAC', hash: 'SHA-256' },
    false, ['sign']
  );
  const sig = await crypto.subtle.sign('HMAC', key, enc.encode(message));
  return Array.from(new Uint8Array(sig)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function md5hex(str) {
  const buf = new TextEncoder().encode(str);
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('').slice(0, 32);
}

async function enviarParaPC(codigo) {
  try {
    const timestamp = Math.floor(Date.now() / 1000);
    const channel = 'sipac';
    const event = 'codigo-lido';
    const dataStr = JSON.stringify({ codigo });
    const bodyMd5 = await md5hex(dataStr);
    const body = JSON.stringify({ name: event, channel, data: dataStr });

    const params = [
      `auth_key=${PUSHER_KEY}`,
      `auth_timestamp=${timestamp}`,
      `auth_version=1.0`,
      `body_md5=${bodyMd5}`
    ].sort().join('&');

    const stringToSign = `POST\n/apps/${PUSHER_APP_ID}/events\n${params}`;
    const signature = await hmacSHA256(PUSHER_SECRET, stringToSign);

    const url = `https://api-${PUSHER_CLUSTER}.pusher.com/apps/${PUSHER_APP_ID}/events?${params}&auth_signature=${signature}`;

    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body
    });

    if (res.ok) sendStatus.style.display = 'block';
  } catch(e) {}
}

async function onCodeFound(code) {
  if (navigator.vibrate) navigator.vibrate([80, 40, 80]);
  resultDiv.textContent = code;
  resultBox.style.display = 'flex';
  document.querySelector('.btn-copy').textContent = '📋 Copiar';
  statusEl.textContent = '✓ Código lido!';
  sendStatus.style.display = 'none';
  stopScan();
  await enviarParaPC(code);
}

function copiar() {
  const code = resultDiv.textContent;
  navigator.clipboard.writeText(code).then(() => {
    document.querySelector('.btn-copy').textContent = '✓ Copiado!';
  }).catch(() => {
    const el = document.createElement('textarea');
    el.value = code;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    document.querySelector('.btn-copy').textContent = '✓ Copiado!';
  });
}

function novaScan() {
  resultBox.style.display = 'none';
  sendStatus.style.display = 'none';
  startScan();
}
</script>
</body>
</html>
