<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner SIPAC</title>
<style>
body {
  background: #0f1117;
  color: white;
  font-family: Arial;
  text-align: center;
  padding: 20px;
}
video {
  width: 100%;
  max-width: 400px;
  border-radius: 12px;
  margin-bottom: 15px;
  display: block;
  margin-left: auto;
  margin-right: auto;
}
button {
  padding: 15px;
  width: 100%;
  max-width: 400px;
  border: none;
  border-radius: 10px;
  background: #00d4aa;
  font-weight: bold;
  font-size: 16px;
  cursor: pointer;
  color: #000;
}
#result-box {
  margin-top: 20px;
  max-width: 400px;
  margin-left: auto;
  margin-right: auto;
  display: none;
}
#result {
  font-size: 22px;
  color: #00d4aa;
  font-weight: bold;
  word-break: break-all;
  margin-bottom: 12px;
}
#copy-btn {
  background: #1a1d27;
  color: #00d4aa;
  border: 2px solid #00d4aa;
  border-radius: 10px;
  padding: 12px;
  width: 100%;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
}
#status {
  margin-top: 12px;
  font-size: 13px;
  color: #7a7f9a;
}
</style>
</head>
<body>

<h2>📦 Scanner SIPAC</h2>
<video id="video" autoplay playsinline muted></video>
<button onclick="toggleScan()" id="btn">▶ Iniciar</button>

<div id="result-box">
  <div id="result">—</div>
  <button id="copy-btn" onclick="copiar()">📋 Copiar para o SIPAC</button>
</div>

<div id="status">Câmera desligada</div>

<canvas id="canvas" style="display:none"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/zxing-js/0.19.1/zxing.min.js"></script>
<script>
let scanning = false;
let stream = null;
let animFrame = null;
let lastCode = '';

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const resultDiv = document.getElementById('result');
const resultBox = document.getElementById('result-box');
const btn = document.getElementById('btn');
const status = document.getElementById('status');

let reader = null;

function getReader() {
  if (!reader) {
    const hints = new Map();
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
      ZXing.BarcodeFormat.QR_CODE,
      ZXing.BarcodeFormat.CODE_128,
      ZXing.BarcodeFormat.CODE_39,
      ZXing.BarcodeFormat.EAN_13,
      ZXing.BarcodeFormat.EAN_8,
      ZXing.BarcodeFormat.ITF
    ]);
    hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
    reader = new ZXing.BrowserMultiFormatReader(hints);
  }
  return reader;
}

async function toggleScan() {
  scanning ? stopScan() : await startScan();
}

async function startScan() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    video.srcObject = stream;
    await video.play();
    scanning = true;
    lastCode = '';
    btn.textContent = '⏹ Parar';
    status.textContent = 'Aponte para o QR Code ou código de barras';
    loop();
  } catch (err) {
    status.textContent = 'Erro: permissão de câmera negada';
    console.error(err);
  }
}

function stopScan() {
  scanning = false;
  if (animFrame) cancelAnimationFrame(animFrame);
  if (stream) stream.getTracks().forEach(t => t.stop());
  video.srcObject = null;
  btn.textContent = '▶ Iniciar';
  status.textContent = 'Câmera desligada';
}

function loop() {
  if (!scanning) return;
  animFrame = requestAnimationFrame(() => {
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      try {
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const luminance = new ZXing.RGBLuminanceSource(imgData.data, canvas.width, canvas.height);
        const bitmap = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(luminance));
        const result = getReader().decode(bitmap);
        if (result && result.text && result.text !== lastCode) {
          lastCode = result.text;
          onCodeFound(result.text);
        }
      } catch (e) { /* nenhum código ainda */ }
    }
    loop();
  });
}

function onCodeFound(code) {
  if (navigator.vibrate) navigator.vibrate(100);
  resultDiv.textContent = code;
  resultBox.style.display = 'block';
  document.getElementById('copy-btn').textContent = '📋 Copiar para o SIPAC';
  status.textContent = '✓ Código lido! Copie e cole no SIPAC.';
  stopScan();
}

function copiar() {
  const code = resultDiv.textContent;
  navigator.clipboard.writeText(code).then(() => {
    document.getElementById('copy-btn').textContent = '✓ Copiado!';
    status.textContent = 'Cole no campo do SIPAC com Ctrl+V';
  }).catch(() => {
    const el = document.createElement('textarea');
    el.value = code;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    document.getElementById('copy-btn').textContent = '✓ Copiado!';
  });
}
</script>
</body>
</html>
